[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
# ffi enables the PostMessage example (grinds a valid message via the SDK over FFI)
ffi = true
fs_permissions = [{ access = "read", path = "./test/vectors" }]
remappings = [
  "forge-std/=lib/forge-std/src/",
  "elliptic-curve-solidity/=lib/elliptic-curve-solidity/contracts/",
]

[rpc_endpoints]
msgboard = "${MSGBOARD_RPC}"
