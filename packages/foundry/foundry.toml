[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
# ffi enables the PostMessage example (grinds a valid message via the SDK over FFI)
ffi = true
fs_permissions = [{ access = "read", path = "./test/vectors" }]
remappings = [
  "forge-std/=lib/forge-std/src/",
  "elliptic-curve-solidity/=lib/elliptic-curve-solidity/contracts/",
]

# Each invariant handler call runs a full secp256k1 scalar multiplication in pure
# Solidity (MsgPow/EllipticCurve), so the forge default budget (256 runs x 500 depth
# ~= 128k calls) takes hours and effectively hangs CI. 64 x 64 = 4096 calls keeps
# meaningful coverage of the used-stamp monotonicity property while finishing in seconds.
[profile.default.invariant]
runs = 64
depth = 64
fail_on_revert = false

[rpc_endpoints]
msgboard = "${MSGBOARD_RPC}"
