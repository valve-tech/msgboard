# Publish stream: on a semver tag (vX.Y.Z), build and publish the public
# @msgboard/* packages whose version is not already on the npm registry.
#
# Prerequisite (human, one-time): create the @msgboard org on npmjs.com and add
# a masked CI/CD variable NPM_TOKEN (an npm automation token with publish rights
# to @msgboard). Until then the job runs but publishing has no credentials.

stages:
  - test
  - publish

# Forge gate: build + test the @msgboard Foundry library on every pipeline.
# Uses the committed golden vector (test/vectors/valid.json), so no Node build needed.
foundry:
  stage: test
  image: ghcr.io/foundry-rs/foundry:latest
  script:
    - cd packages/foundry
    - forge install foundry-rs/forge-std --no-git
    - forge install witnet/elliptic-curve-solidity --no-git
    - forge build
    - forge test -vv

publish:
  stage: publish
  image: node:22
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
  script:
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
    - npm ci
    # build in dependency order (core <- sdk <- hardhat); hardhat ships its tsc output
    - npm run build --workspace @msgboard/core
    - npm run build --workspace @msgboard/sdk
    - "(cd packages/hardhat && npx tsc)"
    # publish each public package whose version is not already on the registry (idempotent)
    - |
      for entry in "@msgboard/core:packages/core" "@msgboard/sdk:packages/sdk" "@msgboard/hardhat:packages/hardhat"; do
        pkg="${entry%%:*}"
        dir="${entry##*:}"
        ver=$(node -p "require('./$dir/package.json').version")
        if npm view "$pkg@$ver" version >/dev/null 2>&1; then
          echo "$pkg@$ver already published, skipping"
        else
          echo "publishing $pkg@$ver"
          npm publish --workspace "$pkg" --access public
        fi
      done
