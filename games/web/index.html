<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MsgBoard Games — provably fair</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,400..900,0..100,0..1&family=Schibsted+Grotesk:wght@400;500;700&family=Spline+Sans+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --felt-900: #07150d;
        --felt-800: #0b2014;
        --felt-700: #11301d;
        --felt-600: #1a4029;
        --line: #235636;
        --cream: #f3ead7;
        --cream-dim: #d8cdb4;
        --ink: #1d1a12;
        --brass: #c9a227;
        --brass-soft: #8a7634;
        --heads: #58c08a;
        --tails: #e26d5a;
        --bad: #ff6b5e;
        --ok: #6fdca6;
        --serif: 'Fraunces', Georgia, serif;
        --sans: 'Schibsted Grotesk', system-ui, sans-serif;
        --mono: 'Spline Sans Mono', ui-monospace, monospace;
      }
      * { box-sizing: border-box; }
      html { color-scheme: dark; }
      body {
        margin: 0;
        color: var(--cream);
        font: 15px/1.55 var(--sans);
        background:
          radial-gradient(1200px 600px at 50% -10%, rgba(224, 168, 52, 0.13), transparent 60%),
          radial-gradient(140% 100% at 50% 30%, transparent 55%, rgba(0, 0, 0, 0.45)),
          radial-gradient(900px 500px at 85% 110%, rgba(88, 192, 138, 0.05), transparent 55%),
          repeating-linear-gradient(0deg, transparent 0 2px, rgba(0, 0, 0, 0.12) 2px 4px),
          var(--felt-800);
        background-attachment: fixed;
        min-height: 100vh;
      }
      /* Fill the viewport so the felt + footer always reach the bottom, even when a game's
         content is short — a flex column with the colophon pushed down (margin-top:auto below). */
      #root {
        max-width: 920px;
        margin: 0 auto;
        padding: 1.25rem 1.25rem 4rem;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
      }
      /* App wrapper fills #root so the footer (margin-top:auto) can pin to the viewport bottom. */
      .app { flex: 1 0 auto; display: flex; flex-direction: column; }

      /* ---------- type ---------- */
      h1 {
        font-family: var(--serif);
        font-weight: 800;
        font-variation-settings: 'SOFT' 60, 'WONK' 1;
        font-size: 2.1rem;
        letter-spacing: 0.01em;
        margin: 0;
        color: var(--cream);
      }
      h1 .gold { color: var(--brass); }
      h2 {
        font-family: var(--serif);
        font-weight: 700;
        font-size: 1.25rem;
        color: var(--brass);
        margin: 2.2rem 0 0.6rem;
        display: flex;
        align-items: center;
        gap: 0.7rem;
      }
      h2::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--brass-soft), transparent); }
      h3 { font-family: var(--serif); font-weight: 700; font-size: 1.02rem; margin: 0 0 0.6rem; color: var(--cream); }

      /* ---------- controls ---------- */
      button {
        font: 600 0.92rem var(--sans);
        color: var(--ink);
        background: linear-gradient(180deg, #dcc26a, var(--brass));
        border: 1px solid #9a7d1f;
        border-radius: 4px;
        padding: 0.5rem 1.05rem;
        cursor: pointer;
        box-shadow: 0 1px 0 rgba(255, 244, 200, 0.5) inset, 0 2px 6px rgba(0, 0, 0, 0.35);
        transition: transform 0.06s ease, filter 0.15s ease;
      }
      button:hover:not(:disabled) { filter: brightness(1.07); }
      button:active:not(:disabled) { transform: translateY(1px); }
      button:disabled { background: var(--felt-600); color: #6f8b78; border-color: var(--line); box-shadow: none; cursor: not-allowed; }
      button.secondary {
        background: transparent;
        color: var(--cream);
        border: 1px solid var(--line);
        box-shadow: none;
      }
      button.secondary:hover:not(:disabled) { border-color: var(--brass-soft); color: var(--brass); filter: none; }
      button.danger { background: linear-gradient(180deg, #e98577, #c14b3b); border-color: #8e3527; color: #fff; }
      input {
        background: var(--felt-900);
        color: var(--cream);
        border: 1px solid var(--line);
        border-radius: 4px;
        padding: 0.48rem 0.65rem;
        font: 500 0.92rem var(--sans);
      }
      input:focus { outline: 1px solid var(--brass-soft); }

      /* ---------- the house menu (no native selects in this establishment) ---------- */
      .menu { position: relative; display: inline-block; }
      .menu-trigger {
        display: inline-flex; align-items: center; gap: 0.55rem;
        background: var(--felt-900);
        color: var(--cream);
        border: 1px solid var(--line);
        border-radius: 4px;
        padding: 0.46rem 0.7rem;
        font: 500 0.92rem var(--sans);
        box-shadow: none;
      }
      .menu-trigger:hover:not(:disabled) { border-color: var(--brass-soft); filter: none; }
      .menu-caret { color: var(--brass-soft); font-size: 0.8em; }
      .menu-panel {
        position: absolute; top: calc(100% + 4px); left: 0; z-index: 30;
        min-width: 100%;
        display: flex; flex-direction: column;
        /* Cap the panel so a long game list scrolls instead of running the whole viewport. */
        max-height: min(60vh, 22rem);
        overflow-y: auto;
        overscroll-behavior: contain;
        background: linear-gradient(180deg, var(--felt-700), var(--felt-800));
        border: 1px solid var(--brass-soft);
        border-radius: 4px;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.55);
        padding: 0.25rem;
        animation: rise 0.14s ease both;
        scrollbar-width: thin;
        scrollbar-color: var(--brass-soft) transparent;
      }
      .menu-panel::-webkit-scrollbar { width: 8px; }
      .menu-panel::-webkit-scrollbar-thumb { background: var(--brass-soft); border-radius: 4px; }
      .menu-option {
        text-align: left; white-space: nowrap;
        background: transparent; color: var(--cream);
        border: none; border-radius: 3px; box-shadow: none;
        padding: 0.42rem 0.7rem;
        font: 500 0.9rem var(--sans);
      }
      .menu-option.highlight { background: var(--felt-600); filter: none; }
      .menu-option.selected { color: var(--brass); font-weight: 700; }
      .menu-icon { width: 1.1em; height: 1.1em; border-radius: 50%; vertical-align: -0.18em; margin-right: 0.45em; }
      .menu-badge { margin-left: auto; padding-left: 0.7rem; font-size: 0.85em; opacity: 0.75; }
      .menu-trigger .menu-icon, .menu-option .menu-icon { margin-right: 0; }
      .menu-trigger, .menu-option { gap: 0.5rem; }
      .menu-option { display: inline-flex; align-items: center; }

      /* ---------- manual stake + threshold ---------- */
      .stake-input { display: inline-flex; align-items: center; gap: 0.35rem; }
      .chip {
        font: 600 0.78rem var(--sans);
        color: var(--cream-dim);
        background: var(--felt-900);
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 0.22rem 0.65rem;
        box-shadow: none;
      }
      .chip:hover:not(:disabled) { border-color: var(--brass-soft); color: var(--brass); filter: none; }
      .chip.active { color: var(--ink); background: linear-gradient(180deg, #dcc26a, var(--brass)); border-color: #9a7d1f; }
      .threshold-label {
        display: inline-flex; align-items: center; gap: 0.45rem;
        font: 600 0.82rem var(--sans); color: var(--cream-dim);
      }

      /* ---------- surfaces ---------- */
      .card {
        position: relative;
        background: linear-gradient(180deg, var(--felt-700), var(--felt-800));
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 1.05rem 1.15rem;
        margin: 0.7rem 0;
        animation: rise 0.45s ease both;
      }
      .card::before {
        content: '';
        position: absolute;
        inset: 4px;
        border: 1px solid rgba(201, 162, 39, 0.16);
        border-radius: 3px;
        pointer-events: none;
      }
      @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
      .card:nth-of-type(2) { animation-delay: 0.05s; }
      .card:nth-of-type(3) { animation-delay: 0.1s; }
      .card:nth-of-type(4) { animation-delay: 0.15s; }

      .banner { border-left: 3px solid var(--brass); background: var(--felt-700); border-radius: 4px; padding: 0.8rem 1rem; margin: 0.7rem 0; }
      .banner.bad { border-left-color: var(--bad); color: #ffb9b1; }

      .row { display: flex; gap: 0.7rem; align-items: center; flex-wrap: wrap; }
      .mono { font-family: var(--mono); font-size: 0.82em; word-break: break-all; }
      .ok { color: var(--ok); }
      .bad { color: var(--bad); }
      .muted { color: #8aa492; }
      .tag {
        display: inline-block;
        font: 600 0.74rem var(--sans);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        background: var(--felt-900);
        border: 1px solid var(--line);
        color: var(--cream-dim);
        border-radius: 999px;
        padding: 0.14rem 0.62rem;
        margin-right: 0.4rem;
      }
      .tag.ok { color: var(--ok); border-color: rgba(111, 220, 166, 0.4); }
      .tag.gold { color: var(--brass); border-color: var(--brass-soft); }

      table { border-collapse: collapse; width: 100%; }
      td, th { text-align: left; padding: 0.34rem 0.6rem; border-bottom: 1px solid rgba(35, 86, 54, 0.55); }

      /* ---------- header marquee ---------- */
      .marquee {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        flex-wrap: wrap;
        padding: 0.9rem 0 1rem;
        border-bottom: 3px double var(--brass-soft);
        margin-bottom: 1rem;
      }
      .strapline { font: 500 0.8rem var(--sans); letter-spacing: 0.22em; text-transform: uppercase; color: var(--brass); margin-top: 0.15rem; }

      /* ---------- the pitch (collapsible explainer) ---------- */
      .pitch { border: 1px solid var(--line); border-radius: 6px; background: var(--felt-700); margin: 0.6rem 0 0.8rem; overflow: hidden; }
      .pitch > summary {
        list-style: none; cursor: pointer; user-select: none;
        display: flex; align-items: center; gap: 0.6rem;
        padding: 0.55rem 1rem;
        font: 700 0.92rem var(--serif);
        color: var(--cream-dim);
      }
      .pitch > summary:hover { color: var(--brass); }
      .pitch > summary::-webkit-details-marker { display: none; }
      .pitch > summary::after { content: '▾'; margin-left: auto; transition: transform 0.2s; color: var(--brass-soft); }
      .pitch[open] > summary::after { transform: rotate(180deg); }
      .pitch .pitch-body { padding: 0 1rem 0.9rem; border-top: 1px solid var(--line); }

      /* ---------- the record (collapsed history) ---------- */
      .history { margin: 0.7rem 0; }
      .history > summary {
        list-style: none; cursor: pointer; user-select: none;
        display: flex; align-items: baseline; gap: 0.7rem; flex-wrap: wrap;
        background: linear-gradient(180deg, var(--felt-700), var(--felt-800));
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0.7rem 1rem;
        font: 600 0.92rem var(--sans);
        color: var(--cream);
      }
      .history > summary::-webkit-details-marker { display: none; }
      .history > summary::before { content: '▸'; color: var(--brass-soft); }
      .history[open] > summary::before { content: '▾'; }
      .history > summary:hover { border-color: var(--brass-soft); }
      .history-hint { margin-left: auto; font: 500 0.78rem var(--sans); }

      .hero-pitch {
        font-family: var(--serif);
        font-size: 1.06rem;
        line-height: 1.6;
        color: var(--cream-dim);
        margin: 0.4rem 0 1rem;
        max-width: 64ch;
      }
      .hero-pitch strong { color: var(--cream); }
      .hero-pitch a { color: var(--brass); }
      .howit {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 0.7rem;
        margin: 0 0 0.6rem;
      }
      .howit-step {
        position: relative;
        background: var(--felt-700);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0.75rem 0.9rem 0.8rem 2.6rem;
        font-size: 0.86rem;
        color: var(--cream-dim);
      }
      .howit-step strong { display: block; color: var(--cream); font-family: var(--serif); margin-bottom: 0.15rem; }
      .howit-step em { color: var(--brass); font-style: normal; font-weight: 700; }
      .howit-footer {
        margin: 0.1rem 0 0.4rem;
        font-size: 0.84rem;
        color: var(--cream-dim);
      }
      .howit-footer strong { color: var(--brass); }
      .howit-footer em { color: var(--cream); font-style: italic; }
      .history > summary a { color: var(--brass-soft); font: 600 0.82rem var(--sans); }
      .history > summary a:hover { color: var(--brass); }
      .howit-num {
        position: absolute; left: 0.75rem; top: 0.8rem;
        width: 1.35rem; height: 1.35rem;
        display: flex; align-items: center; justify-content: center;
        font: 700 0.85rem var(--serif);
        color: var(--ink);
        background: radial-gradient(circle at 35% 30%, #f0d97c, var(--brass) 60%, #8a6f15);
        border: 1px solid #8a6f15;
        border-radius: 50%;
      }
      /* margin-top:auto pins the footer to the viewport bottom on short pages; on tall pages it
         collapses and the border-top + padding keep the separation. */
      .colophon { margin-top: auto; padding-top: 0.8rem; border-top: 1px solid var(--line); font: 500 0.78rem var(--sans); color: #79927f; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
      .colophon a { color: var(--brass-soft); }

      /* ---------- ticket tabs ---------- */
      .tabs { display: flex; gap: 0.6rem; align-items: center; margin: 0.9rem 0 0.4rem; }
      .tab {
        font: 700 0.95rem var(--serif);
        color: var(--cream-dim);
        background: var(--felt-700);
        border: 1px solid var(--line);
        border-bottom: none;
        border-radius: 6px 6px 0 0;
        padding: 0.5rem 1.2rem 0.55rem;
        box-shadow: none;
      }
      .tab.active {
        color: var(--ink);
        background: linear-gradient(180deg, var(--cream), #e4d8bd);
        border-color: #b3a275;
      }
      .blockline { margin-left: auto; font: 600 0.78rem var(--mono); color: #79927f; }

      /* ---------- coin side picker ---------- */
      .side-picker { display: inline-flex; border: 1px solid var(--line); border-radius: 999px; overflow: hidden; }
      .side-picker button {
        border: none; border-radius: 0; box-shadow: none; background: var(--felt-900); color: var(--cream-dim);
        padding: 0.45rem 1.1rem; font-weight: 700;
      }
      .side-picker button.sel-heads { background: var(--heads); color: var(--ink); }
      .side-picker button.sel-tails { background: var(--tails); color: var(--ink); }

      .coin {
        display: inline-block; width: 1.05em; height: 1.05em; vertical-align: -0.18em; border-radius: 50%;
        background: radial-gradient(circle at 35% 30%, #f0d97c, var(--brass) 60%, #8a6f15);
        border: 1px solid #8a6f15; margin-right: 0.45em;
      }
      .flipping .coin { animation: spin 1.1s linear infinite; }
      @keyframes spin { 0% { transform: rotateY(0); } 100% { transform: rotateY(360deg); } }

      /* ---------- the receipt (verify panel) ---------- */
      .receipt {
        position: relative;
        margin-top: 0.9rem;
        background:
          repeating-linear-gradient(0deg, transparent 0 3px, rgba(0, 0, 0, 0.025) 3px 6px),
          var(--cream);
        color: var(--ink);
        border-radius: 2px;
        padding: 0.9rem 1.05rem 1rem;
        font-family: var(--mono);
        font-size: 0.82rem;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);
        --notch: radial-gradient(circle, transparent 0 4px, var(--cream) 4.5px);
      }
      .receipt::before, .receipt::after {
        content: '';
        position: absolute; left: 0; right: 0; height: 7px;
        background-image: radial-gradient(circle at 6px 0px, transparent 0 4px, var(--cream) 4.5px);
        background-size: 14px 7px;
      }
      .receipt::before { top: -6px; transform: rotate(180deg); }
      .receipt::after { bottom: -6px; }
      .receipt h3 { font-family: var(--mono); font-weight: 600; font-size: 0.8rem; letter-spacing: 0.14em; text-transform: uppercase; color: #6b6049; margin-bottom: 0.55rem; }
      .receipt table td { border-bottom: 1px dashed #c9bda0; padding: 0.3rem 0.4rem; vertical-align: top; }
      .receipt .muted { color: #857a60; }
      .receipt .mono { color: #3c372a; }
      .receipt a, .card .receipt a { color: #7a6420; text-decoration-color: rgba(122, 100, 32, 0.5); }
      .receipt a:hover, .card .receipt a:hover { color: #5c4a12; }
      .stamp {
        display: inline-block;
        margin-top: 0.7rem;
        font: 700 0.9rem var(--sans);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 0.3rem 0.8rem;
        border: 2.5px solid currentColor;
        border-radius: 4px;
        transform: rotate(-2.5deg);
        animation: stamp 0.3s cubic-bezier(0.2, 1.6, 0.4, 1) both;
      }
      @keyframes stamp { from { opacity: 0; transform: rotate(-2.5deg) scale(1.6); } to { opacity: 1; transform: rotate(-2.5deg) scale(1); } }
      .stamp.ok { color: #1d7a4c; }
      .stamp.bad { color: #b3261e; }

      /* ---------- the fairness strip (trust, compacted) ---------- */
      .trust-strip {
        display: flex; align-items: center; gap: 0.5rem 0.7rem; flex-wrap: wrap;
        border: 1px solid var(--brass-soft); border-radius: 6px;
        background: linear-gradient(180deg, var(--felt-700), var(--felt-800));
        padding: 0.5rem 0.9rem; margin: 0.7rem 0;
        font: 500 0.88rem var(--sans); color: var(--cream-dim);
      }
      .trust-seal { color: var(--brass); font-size: 1.05rem; line-height: 1; filter: drop-shadow(0 0 6px rgba(201, 162, 39, 0.35)); }
      /* Plain inline flow — inline-flex made every text fragment + <strong> its own flex item,
         which hard-broke the sentence mid-phrase across 3 lines. */
      .trust-line { display: inline; min-width: 0; }
      .trust-line strong { color: var(--cream); }
      .trust-ack, .trust-strip .rules-ack { margin-left: auto; }
      .trust-ack { padding: 0.34rem 0.85rem; font-size: 0.82rem; }
      .rules-ack { font: 600 0.8rem var(--sans); letter-spacing: 0.04em; color: var(--ok); white-space: nowrap; }
      .trust-validators { margin: 0.55rem 0 0; }
      .trust-validators a { color: var(--brass); }

      /* ---------- provenance: when it happened + where to check it ---------- */
      .card-meta {
        margin-top: 0.55rem;
        font: 500 0.74rem var(--mono);
        color: #79927f;
        display: flex; flex-wrap: wrap; gap: 0.25rem 1.1rem;
      }
      td.card-meta { display: table-cell; margin-top: 0; }
      .card-meta a { color: var(--brass-soft); text-decoration-color: rgba(138, 118, 52, 0.5); }
      .card-meta a:hover { color: var(--brass); }
      .card-meta-label { color: #8aa492; text-transform: uppercase; letter-spacing: 0.07em; font-size: 0.92em; }
      .card a { color: var(--cream); text-decoration-color: rgba(138, 118, 52, 0.6); }
      .card a:hover { color: var(--brass); }

      /* ---------- the info dot (where does this come from?) ---------- */
      .info-dot { position: relative; display: inline-flex; margin-left: 0.15rem; }
      .info-trigger {
        width: 1.15rem; height: 1.15rem; padding: 0;
        display: inline-flex; align-items: center; justify-content: center;
        font: 700 0.7rem var(--serif);
        font-style: italic;
        color: var(--brass);
        background: transparent;
        border: 1px solid var(--brass-soft);
        border-radius: 50%;
        box-shadow: none;
        cursor: help;
      }
      .info-trigger:hover:not(:disabled) { background: rgba(201, 162, 39, 0.12); filter: none; }
      .info-pop {
        visibility: hidden; opacity: 0;
        position: absolute; z-index: 40; top: calc(100% + 8px); left: 50%;
        transform: translateX(-50%);
        width: min(330px, 78vw);
        background: linear-gradient(180deg, var(--felt-700), var(--felt-800));
        border: 1px solid var(--brass-soft);
        border-radius: 6px;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.6);
        padding: 0.7rem 0.85rem;
        font: 400 0.8rem/1.5 var(--sans);
        letter-spacing: normal;
        text-transform: none;
        color: var(--cream-dim);
        transition: opacity 0.15s ease;
      }
      /* hover bridge so the pointer can travel from the dot into the popover */
      .info-pop::before { content: ''; position: absolute; top: -10px; left: 0; right: 0; height: 10px; }
      .info-pop strong { color: var(--cream); }
      .info-pop a { color: var(--brass); }
      .info-dot:hover .info-pop,
      .info-dot:focus-within .info-pop { visibility: visible; opacity: 1; }
      h2 .info-pop { font-family: var(--sans); font-weight: 400; }

      /* ---------- responsive: phones / narrow ---------- */
      @media (max-width: 600px) {
        #root { padding: 0.85rem 0.85rem 2.25rem; }
        h1 { font-size: 1.6rem; }
        h2 { font-size: 1.1rem; margin-top: 1.6rem; }
        .strapline { letter-spacing: 0.14em; font-size: 0.72rem; }
        .marquee { padding: 0.7rem 0 0.75rem; margin-bottom: 0.8rem; gap: 0.6rem; }
        .card { padding: 0.85rem 0.9rem; }
        .pitch > summary { padding: 0.7rem 0.85rem; }
        .pitch .pitch-body { padding: 0 0.85rem 0.8rem; }
        /* The info popover is fixed-ish width on desktop; keep it inside the viewport on phones. */
        .info-pop { max-width: min(88vw, 20rem); }
      }
      /* Respect reduced-motion: the rise/fade-in animations are decorative. */
      @media (prefers-reduced-motion: reduce) {
        * { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
