name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
      - run: npm ci
      - run: npm run build --workspace @msgboard/core
      - run: npm run build --workspace @msgboard/sdk
      # history imports @msgboard/cosign, so cosign's dist/ must exist before it typechecks
      - run: npm run build --workspace @msgboard/cosign
      - run: npm run build --workspace @msgboard/history
      - run: (cd packages/hardhat && npx tsc)
      # deterministic SDK unit tests (the OpenRPC spec + reference renderer)
      - run: (cd packages/sdk && npx vitest run src/openrpc.test.ts src/render-reference.test.ts)
      # @msgboard/history archive + query-server tests (deterministic, no DB needed)
      - run: npm run test --workspace @msgboard/history

  foundry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: foundry-rs/foundry-toolchain@v1
      - name: forge build + test
        working-directory: packages/foundry
        run: |
          forge install foundry-rs/forge-std --no-git
          forge install witnet/elliptic-curve-solidity --no-git
          forge build
          forge test -vv

  foundry-integration:
    # Live tests against a real msgboard node. Non-blocking: an external-endpoint hiccup
    # should not fail required CI.
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      MSGBOARD_RPC: https://one.valve.city/rpc/vk_demo/evm/943
    steps:
      - uses: actions/checkout@v5
      - uses: foundry-rs/foundry-toolchain@v1
      - name: forge integration tests (live msgboard node)
        working-directory: packages/foundry
        run: |
          forge install foundry-rs/forge-std --no-git
          forge install witnet/elliptic-curve-solidity --no-git
          forge test --match-path "test/integration/*" -vv
