name: publish

# Publish stream: on a semver tag (vX.Y.Z), build and publish the public
# @msgboard/* packages whose version is not already on the npm registry.
#
# Authentication is OpenID Connect trusted publishing — NO long-lived npm token.
# GitHub mints a short-lived OpenID Connect token (requires the id-token: write
# permission below) and npm 11.5.1+ exchanges it for publish rights, provided each
# package has a matching trusted-publisher record on npmjs.com.
#
# Human prerequisites (one-time):
#   1. Because npm (unlike PyPI) cannot register a trusted publisher for a package
#      that does not yet exist, publish each @msgboard/* package once by hand from a
#      machine with an interactive `npm login` session (a browser session token, not
#      an automation token). This bootstrap publish carries no provenance; every
#      OpenID Connect publish afterward does.
#   2. On npmjs.com, add a GitHub Actions trusted publisher to EACH package
#      (npmjs.com/package/<name>/access). Fields must match this workflow exactly:
#        Organization or user: valve-tech
#        Repository:           msgboard
#        Workflow filename:    publish.yml   (filename only, no path)
#        Environment name:     (leave blank — this job declares no environment)
#        Allowed actions:      npm publish
# A mismatch on any field surfaces only as a generic 404 at publish time.

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # mint the OpenID Connect token npm exchanges for publish rights
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      # Node 22 ships npm 10.x; trusted publishing needs 11.5.1+. --force avoids a
      # self-upgrade crash ("Cannot find module 'promise-retry'").
      - run: npm install -g --force npm@latest

      - run: npm ci

      # build in dependency order (core <- sdk <- hardhat <- relayer); hardhat ships its tsc output
      - run: npm run build --workspace @msgboard/core
      - run: npm run build --workspace @msgboard/sdk
      - run: (cd packages/hardhat && npx tsc)
      - run: npm run build --workspace @msgboard/relayer

      # No NODE_AUTH_TOKEN: authentication is OpenID Connect. Provenance is automatic.
      - name: Publish public @msgboard/* (idempotent)
        run: |
          for entry in "@msgboard/core:packages/core" "@msgboard/sdk:packages/sdk" "@msgboard/hardhat:packages/hardhat" "@msgboard/relayer:packages/relayer"; do
            pkg="${entry%%:*}"
            dir="${entry##*:}"
            ver=$(node -p "require('./$dir/package.json').version")
            if npm view "$pkg@$ver" version >/dev/null 2>&1; then
              echo "$pkg@$ver already published, skipping"
            else
              echo "publishing $pkg@$ver"
              # Treat "cannot publish over previously published" as success in case the
              # registry read above lagged behind a recent bootstrap publish.
              npm publish --workspace "$pkg" --access public || {
                if npm view "$pkg@$ver" version >/dev/null 2>&1; then
                  echo "$pkg@$ver confirmed on registry after publish attempt, continuing"
                else
                  echo "$pkg@$ver publish failed and version not found on registry"
                  exit 1
                fi
              }
            fi
          done
