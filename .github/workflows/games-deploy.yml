# Deploys the games web app (gibsfinance/random examples/games/web) to games.msgboard.xyz on
# the msgboard box. Exists as a workflow because the box only accepts ssh (port 22) and the
# operator machine's network may not allow outbound 22 — Actions runners always do.
#
# mode=recon  : read-only — print the box's Caddy layout so a deploy can match its conventions.
# mode=deploy : build the web app from gibsfinance/random@games-platform, upload it to
#               /var/www/games, install the games.msgboard.xyz Caddy site block if absent,
#               validate, and reload. Idempotent.
name: games-deploy
on:
  workflow_dispatch:
    inputs:
      mode:
        description: recon (read-only survey) or deploy
        required: true
        default: recon
        type: choice
        options: [recon, deploy, actors]

jobs:
  games:
    runs-on: ubuntu-latest
    steps:
      - name: ssh setup
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.MSGBOARD_SSH_KEY }}" > ~/.ssh/box
          chmod 600 ~/.ssh/box
          ssh-keyscan -t ed25519 88.99.62.98 >> ~/.ssh/known_hosts 2>/dev/null

      - name: recon
        if: inputs.mode == 'recon'
        run: |
          # public repo -> public logs: print only what the deploy step needs, no full config
          ssh -i ~/.ssh/box root@88.99.62.98 '
            C=$(docker ps --format "{{.Names}}" | grep -i caddy | head -1)
            echo "caddy-container: $C"
            docker inspect "$C" --format "{{range .Mounts}}{{.Source}} -> {{.Destination}}{{println}}{{end}}"
            docker inspect "$C" --format "compose-dir: {{index .Config.Labels \"com.docker.compose.project.working_dir\"}}"
            HOSTCADDY=$(docker inspect "$C" --format "{{range .Mounts}}{{.Source}} {{.Destination}}{{println}}{{end}}" | awk "\$2 ~ /Caddyfile/ {print \$1}" | head -1)
            echo "host-caddyfile: $HOSTCADDY"
            [ -n "$HOSTCADDY" ] && grep -m1 -A2 "^msgboard.xyz" "$HOSTCADDY" | grep -o "tls [^ ]* [^ ]*" || true
            [ -n "$HOSTCADDY" ] && grep -c "msgboard.xyz" "$HOSTCADDY" | xargs echo "msgboard-blocks:"
          '

      - name: checkout games source
        if: inputs.mode == 'deploy' || inputs.mode == 'actors'
        uses: actions/checkout@v4
        with:
          repository: gibsfinance/random
          ref: games-platform
          path: random

      - name: build
        if: inputs.mode == 'deploy' || inputs.mode == 'actors'
        run: |
          cd random
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm install
          cd packages/contracts && npx hardhat compile && cd ../..
          if [ "${{ inputs.mode }}" = "deploy" ]; then
            pnpm --filter @gibs/games-web build
            tar -C examples/games/web/dist -czf /tmp/games-web.tgz .
          else
            cd examples/games/e2e
            npx esbuild scripts/cast-watcher.ts --bundle --platform=node --target=node22 --format=esm \
              --banner:js="import { createRequire } from 'module'; const require = createRequire(import.meta.url);" \
              --outfile=/tmp/cast-watcher.mjs
            npx esbuild scripts/player-bots.ts --bundle --platform=node --target=node22 --format=esm \
              --banner:js="import { createRequire } from 'module'; const require = createRequire(import.meta.url);" \
              --outfile=/tmp/player-bots.mjs
            cp scripts/943-deployment.json /tmp/
          fi

      - name: upload + caddy
        if: inputs.mode == 'deploy'
        run: |
          scp -i ~/.ssh/box /tmp/games-web.tgz root@88.99.62.98:/tmp/games-web.tgz
          ssh -i ~/.ssh/box root@88.99.62.98 '
            set -e
            # The caddy container only bind-mounts deploy/caddy/graphiql (-> /srv/graphiql), the
            # Caddyfile, and the origin cert. Serving from a subdir of that mount avoids editing
            # compose and recreating the container (which would briefly drop msgboard.xyz).
            DEST=/opt/msgboard/deploy/caddy/graphiql/games
            CADDYFILE=/opt/msgboard/deploy/caddy/Caddyfile
            mkdir -p "$DEST.new"
            tar -C "$DEST.new" -xzf /tmp/games-web.tgz
            rm -rf "$DEST.old"
            [ -d "$DEST" ] && mv "$DEST" "$DEST.old"
            mv "$DEST.new" "$DEST"
            rm -f /tmp/games-web.tgz
            if ! grep -q "games.msgboard.xyz" "$CADDYFILE"; then
              cp "$CADDYFILE" "$CADDYFILE.bak.games"
              {
                echo ""
                echo "games.msgboard.xyz {"
                echo "	tls /etc/caddy/origin.pem /etc/caddy/origin.key"
                echo "	encode gzip zstd"
                echo "	# host path /opt/msgboard/deploy/caddy/graphiql/games (the existing bind mount)"
                echo "	root * /srv/graphiql/games"
                echo "	try_files {path} /index.html"
                echo "	file_server"
                echo "}"
              } >> "$CADDYFILE"
            fi
            docker exec caddy caddy validate --config /etc/caddy/Caddyfile
            docker exec caddy caddy reload --config /etc/caddy/Caddyfile
            echo DEPLOYED
          '

      - name: smoke
        if: inputs.mode == 'deploy'
        run: |
          sleep 3
          curl -sS -o /dev/null -w 'games.msgboard.xyz -> %{http_code}\n' https://games.msgboard.xyz
          curl -sS https://games.msgboard.xyz | grep -o '<title>[^<]*</title>'

      - name: actors up
        if: inputs.mode == 'actors'
        run: |
          cat > /tmp/actors-compose.yml <<'EOF'
          services:
            cast-watcher:
              image: node:22-alpine
              restart: unless-stopped
              working_dir: /app
              volumes: [ "./:/app" ]
              env_file: .env
              environment:
                CHAIN: "943"
                CONFIG: /app/943-deployment.json
              command: node cast-watcher.mjs
            player-bots:
              image: node:22-alpine
              restart: unless-stopped
              working_dir: /app
              volumes: [ "./:/app" ]
              env_file: .env
              environment:
                CHAIN: "943"
                CONFIG: /app/943-deployment.json
              command: node player-bots.mjs
          EOF
          umask 077
          printf 'MNEMONIC=%s\nSEEDS0=%s\n' "${{ secrets.RANDOMNESS_MNEMONIC }}" "${{ secrets.SEEDS0_MNEMONIC }}" > /tmp/actors.env
          ssh -i ~/.ssh/box root@88.99.62.98 'mkdir -p /opt/games-actors && chmod 700 /opt/games-actors'
          scp -i ~/.ssh/box /tmp/cast-watcher.mjs /tmp/player-bots.mjs /tmp/943-deployment.json /tmp/actors-compose.yml root@88.99.62.98:/opt/games-actors/
          scp -i ~/.ssh/box /tmp/actors.env root@88.99.62.98:/opt/games-actors/.env
          rm -f /tmp/actors.env
          ssh -i ~/.ssh/box root@88.99.62.98 '
            set -e
            cd /opt/games-actors
            mv actors-compose.yml docker-compose.yml
            chmod 600 .env
            docker compose up -d --force-recreate
            sleep 6
            docker compose ps --format "{{.Name}} {{.State}}"
            docker compose logs --tail 3 cast-watcher | tail -3
            docker compose logs --tail 3 player-bots | tail -3
          '
