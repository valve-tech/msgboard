# Copy to inventory.ini (gitignored) and fill in. Both cosign + waku deploy to the SAME box: the
# msgboard prod box (88.99.62.98) — nwaku is co-located there on the `edge` network, not a separate box.
#
# SSH is root via a key in the 1Password agent (title "msgboard_faucet_box"). Run ansible-playbook with
# SSH_AUTH_SOCK pointed at the 1P agent, and select just that key with -i <its pubkey> + IdentitiesOnly
# (offering all agent keys trips the server's MaxAuthTries). ControlPersist keeps one connection so the
# 1Password approval is needed only once.

[msgboard]
msgboard-1 ansible_host=88.99.62.98 ansible_user=root

[msgboard:vars]
ansible_ssh_common_args=-o IdentitiesOnly=yes -i /path/to/msgboard_faucet_box.pub -o ControlMaster=auto -o ControlPersist=600s -o StrictHostKeyChecking=accept-new
