services:
  cast-watcher:
    image: node:24-alpine
    restart: unless-stopped
    working_dir: /app
    volumes: [ "./:/app" ]
    env_file: .env
    environment:
      CHAIN: "943"
      CONFIG: /app/943-deployment.json
      # keyed RPC for the chain reads/sends too — the public 943 RPC the default falls back to is flaky
      RPC: "https://one.valve.city/rpc/${VALVE_RPC_KEY}/evm/943"
      MSGBOARD_RPC: "https://one.valve.city/rpc/${VALVE_RPC_KEY}/evm/943"
    command: node cast-watcher.mjs
  player-bots:
    image: node:24-alpine
    restart: unless-stopped
    working_dir: /app
    volumes: [ "./:/app" ]
    env_file: .env
    environment:
      CHAIN: "943"
      CONFIG: /app/943-deployment.json
      RPC: "https://one.valve.city/rpc/${VALVE_RPC_KEY}/evm/943"
    command: node player-bots.mjs
  # FlipBook maker/taker pair: keeps the P2P offer book stocked on testnet and continuously
  # soak-tests post/take/reveal/claim/cancel (incl. a deterministic forfeit slice).
  flipbook-bots:
    image: node:24-alpine
    restart: unless-stopped
    working_dir: /app
    volumes: [ "./:/app" ]
    env_file: .env
    environment:
      CHAIN: "943"
      RPC: "https://one.valve.city/rpc/${VALVE_RPC_KEY}/evm/943"
      FLIPBOOK: "0xb009bd8b849dd33d9c5081ec6e53f29a947f6832"
      FLIPBOOK_DEPLOY_BLOCK: "24921235"
      # variant B: off-chain signed offers over x402PLS, sprayed + read on msgboard, taker driven
      # by WebSocket newHeads pushes (BOARD_WS defaults to the wss games proxy for the chain).
      FLIPBOOKX: "0x9e232e84E80FCaC3c78dE0820dABccf660511275"
      FLIPBOOKX_DEPLOY_BLOCK: "24932217"
      INTERVAL_MS: "180000"
      SELF_PLAY_INTERVAL_MS: "600000"
    command: node flipbook-bots.mjs
  # Continuously exercises the cosign.msgboard.xyz co-sign-over-board flow on 943: one
  # propose/cosign/threshold-reach session per hour. SAFE_943 + RELAY_URL are pinned by the
  # operator later — this actor is inert (no target Safe) until they're set on the box .env.
  cosign-bot:
    image: node:24-alpine
    restart: unless-stopped
    working_dir: /app
    volumes: [ "./:/app" ]
    env_file: .env
    environment:
      CHAIN: "943"
      RPC: "https://one.valve.city/rpc/${VALVE_RPC_KEY}/evm/943"
      INTERVAL_MS: "3600000"
      THRESHOLD: "2"
      COSIGN_INDICES: "40,41,42"
      # The deterministic fleet Safe (derived from the signer set — logged by the bot on first
      # boot) and the live gasless-deploy relay. Both public config, so they live here, not .env.
      SAFE_943: "0x67D4FBA30DFeFb1AA2d199c33e239dc6BCAfF705"
      RELAY_URL: "https://cosign.msgboard.xyz/relay"
    command: node cosign-bot.mjs
  # Off-chain session tables: keeps every @msgboard/games table alive on 943 — all 16 single-draw
  # games (dice/limbo/plinko/keno/crash/pachinko/wheel/monte/dicex2/baccarat/dragonTiger/andarBahar/
  # cascade/roulette + wordle), all 7 ladder games (towers/chicken/firewalk/heist/hilo/greedDice/
  # cipher), the decision card games (blackjack/threeCardPoker/videoPoker/paiGow), stateful mines,
  # the sudoku solver, and the two-peer hilo-war ZK duel. In-process HouseSession co-sign (no on-chain
  # tx, no funded key — just MNEMONIC at addressIndex 30). BOARD_FEED is off by default; set it to "1"
  # once the WASM grinder is wired into the bundle to light up the games.msgboard.xyz:lobby:943 feed.
  session-bots:
    image: node:24-alpine
    restart: unless-stopped
    working_dir: /app
    volumes: [ "./:/app" ]
    env_file: .env
    environment:
      CHAIN: "943"
      CONFIG: /app/943-deployment.json
      RPC: "https://one.valve.city/rpc/${VALVE_RPC_KEY}/evm/943"
    command: node session-bots.mjs
  cast-watcher-369:
    image: node:24-alpine
    restart: unless-stopped
    working_dir: /app
    volumes: [ "./:/app" ]
    env_file: .env
    environment:
      CHAIN: "369"
      CONFIG: /app/369-deployment.json
      INTERVAL_MS: "30000"
      VAULT_FLOOR: "5000"
      RPC: "https://one.valve.city/rpc/${VALVE_RPC_KEY}/evm/369"
      MSGBOARD_RPC: "https://one.valve.city/rpc/${VALVE_RPC_KEY}/evm/369"
    command: node cast-watcher.mjs
  player-bots-369:
    image: node:24-alpine
    restart: unless-stopped
    working_dir: /app
    volumes: [ "./:/app" ]
    env_file: .env
    environment:
      CHAIN: "369"
      CONFIG: /app/369-deployment.json
      INTERVAL_MS: "900000"
      SELF_PLAY_INTERVAL_MS: "21600000"
      VAULT_FLOOR: "5000"
      MAX_STAKE: "25"
      # 369-sized floats (mainnet gas ~4e5 gwei): the pre-flight envelope for a 4M-gas enter is
      # ~3.5k PLS, so the cushion covers one envelope and the top-up band sits above cushion+stake.
      # The 200-PLS testnet default wedged the bots at nonce 0 from first boot (2026-07-21).
      GAS_CUSHION: "4000"
      TOP_UP_BELOW: "4500"
      TOP_UP_TO: "8000"
      RPC: "https://one.valve.city/rpc/${VALVE_RPC_KEY}/evm/369"
    command: node player-bots.mjs
