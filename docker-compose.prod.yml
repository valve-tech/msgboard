networks:
  msgboard:
    driver: bridge
  # Shared cross-app network. This Caddy joins it so it can reach co-located apps'
  # containers (e.g. bridge-sponsor-web) by name. Created on the box by either app's deploy
  # (`docker network create edge`); declared external so compose does not try to own it.
  edge:
    external: true

volumes:
  postgres-data:
  caddy_data:
  caddy_config:

# shared definition for the per-network spam writers (one container per chain).
# Runs the COMPILED grinder (node dist/spam.js, via sponsor:spam:start) rather than tsx:
# SPAM_WORKERS spawns worker threads, and tsx does not apply its loader inside a worker,
# so a worker re-running the .ts entry cannot resolve sibling imports. The built .js does.
x-spam-writer: &spam-writer
  build:
    context: .
    dockerfile: ./Dockerfile
  restart: unless-stopped
  networks:
    - msgboard
  command: ['npm', 'run', 'sponsor:spam:start']

services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./deploy/caddy/origin.pem:/etc/caddy/origin.pem:ro
      - ./deploy/caddy/origin.key:/etc/caddy/origin.key:ro
      # GraphiQL explorer static page served at archive.msgboard.xyz
      - ./deploy/caddy/graphiql:/srv/graphiql:ro
      # Shared edge mounts (box-level, outside any repo tree so neither app's rsync --delete
      # can wipe them): co-located apps' site fragments and their origin certs.
      - /opt/edge/sites-enabled:/etc/caddy/sites-enabled:ro
      - /opt/edge/certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - ui
      - faucet
      - hasura
    networks:
      - msgboard
      - edge

  ui:
    container_name: ui
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        VITE_RPC_1: ${VITE_RPC_1:-}
        VITE_RPC_369: ${VITE_RPC_369:-}
        VITE_RPC_943: ${VITE_RPC_943:-}
    restart: unless-stopped
    networks:
      - msgboard
    # Root Dockerfile CMD runs `npm run start` -> `vite preview --host` on port 4173,
    # which serves the built UI AND the /api/rpc-proxy endpoint. No host port: Caddy
    # reaches it over the compose network.

  faucet:
    container_name: faucet
    build:
      context: ./packages/faucet
      dockerfile: ./Dockerfile
    restart: unless-stopped
    environment:
      WEB3_PROVIDER: ${WEB3_PROVIDER:-https://rpc.v4.testnet.pulsechain.com}
      PRIVATE_KEY: ${FAUCET_PRIVATE_KEY:-}
      PORT: 8080
      PROXY_COUNT: 1
      PAYOUT: ${PAYOUT:-10}
    networks:
      - msgboard

  sponsor:
    container_name: sponsor
    build:
      context: .
      dockerfile: ./Dockerfile
    depends_on:
      - msgboard-postgres
    restart: unless-stopped
    networks:
      - msgboard
    environment:
      MNEMONIC: ${MNEMONIC:-}
      DATABASE_URL: postgres://msgboard-postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@msgboard-postgres:5432/msgboard-postgres
      RPC_369: ${RPC_369:-}
      RPC_943: ${RPC_943:-}
    command: ['npm', 'run', 'sponsor:start']

  # spam: posts random lorem-style messages so each board shows activity. Submission
  # is proof-of-work gated, so it needs only an msgboard-enabled RPC — no wallet,
  # no database. One writer per network (SPAM_CHAIN_ID selects 1, 369, or 943);
  # SPAM_INTERVAL_MS / SPAM_CATEGORIES tune cadence and categories for all of them.
  spam-943:
    <<: *spam-writer
    container_name: spam-943
    environment:
      SPAM_CHAIN_ID: '943'
      RPC_943: ${RPC_943:-}
      SPAM_INTERVAL_MS: ${SPAM_INTERVAL_MS:-60000}
      SPAM_CATEGORIES: ${SPAM_CATEGORIES:-lorem,musings,chatter}
      # parallel grind threads per chain (8-core box; grinders idle between posts)
      SPAM_WORKERS: ${SPAM_WORKERS:-2}

  spam-369:
    <<: *spam-writer
    container_name: spam-369
    environment:
      SPAM_CHAIN_ID: '369'
      RPC_369: ${RPC_369:-}
      SPAM_INTERVAL_MS: ${SPAM_INTERVAL_MS:-60000}
      SPAM_CATEGORIES: ${SPAM_CATEGORIES:-lorem,musings,chatter}
      SPAM_WORKERS: ${SPAM_WORKERS:-2}

  spam-1:
    <<: *spam-writer
    container_name: spam-1
    environment:
      SPAM_CHAIN_ID: '1'
      RPC_1: ${RPC_1:-}
      SPAM_INTERVAL_MS: ${SPAM_INTERVAL_MS:-60000}
      SPAM_CATEGORIES: ${SPAM_CATEGORIES:-lorem,musings,chatter}
      SPAM_WORKERS: ${SPAM_WORKERS:-2}

  # bridge: the bridge-crossing sponsor writer. Watches the bridge for new bridgers
  # and posts a PoW `gasmoneyplease` message for each, which the `sponsor` service
  # reads and funds with gas. (Formerly mis-named "spam".)
  bridge:
    container_name: bridge
    build:
      context: .
      dockerfile: ./Dockerfile
    restart: unless-stopped
    networks:
      - msgboard
    environment:
      RPC_369: ${RPC_369:-}
      RPC_943: ${RPC_943:-}
      # default to PulseChain v4 testnet only (id 369 = mainnet, which the v4-only
      # sponsor does not fund); override DISABLED_CHAINS to change.
      DISABLED_CHAINS: ${DISABLED_CHAINS:-369}
      # opt into live mode — the Relayer engine defaults to observe/dry-run when this is absent
      BRIDGE_LIVE: '1'
    command: ['npm', 'run', 'sponsor:bridge']

  # indexer: the dedicated, multichain archivist. One relayer per chain watches every
  # category and records what it sees into the message_archive table (postgresArchiveSink,
  # backed by @msgboard/history). This is the WRITE side of the historical archive that
  # Hasura serves. Independent of the sponsor scripts on purpose.
  indexer:
    container_name: indexer
    build:
      context: .
      dockerfile: ./Dockerfile
    depends_on:
      - msgboard-postgres
    restart: unless-stopped
    networks:
      - msgboard
    environment:
      DATABASE_URL: postgres://msgboard-postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@msgboard-postgres:5432/msgboard-postgres
      INDEXER_CHAINS: ${INDEXER_CHAINS:-1,369,943}
      RPC_1: ${RPC_1:-}
      RPC_369: ${RPC_369:-}
      RPC_943: ${RPC_943:-}
      INDEXER_INTERVAL_MS: ${INDEXER_INTERVAL_MS:-20000}
      RETENTION_DAYS: ${RETENTION_DAYS:-365}
    command: ['npm', 'run', 'indexer:start']

  # random-indexer-943: the gibsfinance/random ponder indexer for chain 943, served at
  # evm-943-entropy.msgboard.xyz (Caddy proxies to :42069 over the docker network — no host
  # port). Builds from the vendored deploy/random-indexer snapshot. Each (re)index runs into
  # a fresh Postgres schema entropy_943_<n> (PONDER_SCHEMA, computed per deploy), inside a
  # dedicated `entropy` database on msgboard-postgres (created by the deploy before this starts).
  random-indexer-943:
    container_name: random-indexer-943
    build:
      context: ./deploy/random-indexer
    depends_on:
      - msgboard-postgres
    restart: unless-stopped
    networks:
      - msgboard
    environment:
      DATABASE_URL: postgres://msgboard-postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@msgboard-postgres:5432/entropy
      PONDER_RPC_URL_943: ${PONDER_RPC_URL_943:?PONDER_RPC_URL_943 must be set (one.valve.city/rpc/<key>/evm/943)}
      PONDER_SCHEMA: ${ENTROPY_943_SCHEMA:?ENTROPY_943_SCHEMA must be set (entropy_943_<n>)}
      PONDER_TELEMETRY_DISABLED: 'true'

  # games-indexer-943: the gibsfinance/random CoinFlip + Raffle ponder indexer for chain 943, served
  # at games-943.msgboard.xyz (Caddy proxies to :42069 over the docker network). Mirrors
  # random-indexer-943 — vendored snapshot in deploy/games-indexer, a fresh Postgres schema
  # games_943_<n> (GAMES_943_SCHEMA) inside a dedicated `games` database on msgboard-postgres (created
  # by the deploy before this starts). Lets the games frontend read rounds from GraphQL instead of
  # scraping eth_getLogs from every browser.
  games-indexer-943:
    container_name: games-indexer-943
    build:
      context: ./deploy/games-indexer
    depends_on:
      - msgboard-postgres
    restart: unless-stopped
    networks:
      - msgboard
    environment:
      DATABASE_URL: postgres://msgboard-postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@msgboard-postgres:5432/games
      PONDER_RPC_URL_943: ${PONDER_RPC_URL_943:?PONDER_RPC_URL_943 must be set (one.valve.city/rpc/<key>/evm/943)}
      PONDER_SCHEMA: ${GAMES_943_SCHEMA:?GAMES_943_SCHEMA must be set (games_943_<n>)}
      PONDER_TELEMETRY_DISABLED: 'true'

  # hasura: GraphQL over the message_archive table. Published on LOOPBACK ONLY
  # (127.0.0.1:8081) — Caddy proxies the public GraphQL endpoint at archive.msgboard.xyz,
  # and the admin API/console are reachable only via an SSH tunnel to this port.
  # The `anonymous` unauthorized role gets SELECT-only on message_archive (set at deploy).
  hasura:
    container_name: hasura
    image: hasura/graphql-engine:v2.42.0 # pinned v2 Community Edition (Apache-2.0)
    depends_on:
      - msgboard-postgres
    restart: unless-stopped
    networks:
      - msgboard
    ports:
      - '127.0.0.1:8081:8080'
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://msgboard-postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@msgboard-postgres:5432/msgboard-postgres
      HASURA_GRAPHQL_ENABLE_CONSOLE: 'false'
      # Fail-fast: an EMPTY admin secret disables Hasura's role enforcement entirely —
      # every request would get full admin access (all tables, mutations, raw SQL), not
      # just the read-only anonymous role. `:?` makes `docker compose up` refuse to start
      # until a real secret is provided, so the anonymous restriction is always in force.
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_ADMIN_SECRET:?HASURA_ADMIN_SECRET must be set (an empty secret exposes full admin access)}
      # Unauthenticated requests assume the read-only `anonymous` role (only enforced
      # because an admin secret is set above).
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: anonymous
      # GraphQL is fetched cross-origin by browsers; Hasura emits the CORS headers.
      HASURA_GRAPHQL_CORS_DOMAIN: '*'
      HASURA_GRAPHQL_DEV_MODE: 'false'
      HASURA_GRAPHQL_ENABLE_TELEMETRY: 'false'

  msgboard-postgres:
    container_name: msgboard-postgres
    image: postgres:16
    shm_size: 16g
    restart: unless-stopped
    command: postgres -c 'max_connections=500' -c work_mem=256MB -c maintenance_work_mem=256MB -c max_wal_size=1GB
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - msgboard
    environment:
      POSTGRES_DB: msgboard-postgres
      POSTGRES_USER: msgboard-postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
